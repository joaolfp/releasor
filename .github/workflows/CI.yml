name: CI
on: [pull_request]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98

      - name: Mise install
        uses: jdx/mise-action@c1ecc8f748cd28cdeabf76dab3cccde4ce692fe4
        with:
          cache: true
          experimental: true

      - uses: Swatinem/rust-cache@bc1860267c1b189716ecde249f61cf86e8408d91

      - name: Run build
        run: mise build

      - name: Run tests
        run: mise test
