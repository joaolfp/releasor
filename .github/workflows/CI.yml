name: CI
on: [pull_request]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98

      - name: Mise install
        uses: jdx/mise-action@9a9bfbd065d075c5eb56872e8913c7708d4ba741
        with:
          cache: true
          experimental: true

      - uses: Swatinem/rust-cache@8a02ed5e290d8afc7e587930243f3016b3223f50

      - name: Run build
        run: mise build

      - name: Run tests
        run: mise test
