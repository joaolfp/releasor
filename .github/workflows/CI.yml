name: CI
on: [pull_request]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98

      - name: Mise install
        uses: jdx/mise-action@1c992c2b17638065c8d3f9973853aeea39f52576
        with:
          cache: true
          experimental: true

      - uses: Swatinem/rust-cache@f51f967e158417aafa338a1e46ab22095f07aa01

      - name: Run build
        run: mise build

      - name: Run tests
        run: mise test
